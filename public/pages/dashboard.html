<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-3" id="groupNameHeader">Dashboard</h2>
        <div class="mb-4">
            <a href="expenses.html" class="btn btn-primary me-2"><i class="bi bi-receipt"></i> Go to Expenses</a>
            <a href="groceries.html" class="btn btn-outline-secondary"><i class="bi bi-cart"></i> Go to Groceries</a>
        </div>

        <div class="row">
            <!-- Balance Card -->
            <div class="col-12 col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted-custom">My Balance</h5>
                        <h2 class="display-6 mt-3" id="dashBalanceAmount">₹ 0.00</h2>
                        <p class="text-muted-custom small" id="dashBalanceText">You are settled up.</p>
                    </div>
                </div>
            </div>

            <!-- Meal Status Card -->
            <div class="col-12 col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-muted-custom text-center border-bottom pb-2">Next Meal</h5>
                        <div class="mt-3" id="dashMealContainer">
                            <div class="text-center text-muted py-3">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Group Overview -->
            <div class="col-12 col-md-4 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body p-4 text-center">
                        <h5 class="card-title text-muted-custom mb-2">Group Spending (Month)</h5>
                        <h2 class="display-6 text-primary mt-3" id="dashTotalSpend">₹ 0</h2>
                        <p class="text-muted small">Total shared expenses and groceries this month.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Activity Section -->
        <h4 class="text-primary-custom mt-4 mb-3">Recent Activity</h4>
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="activityLogContainer">
                    <div class="list-group-item text-center text-muted py-4">Loading activities...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
