<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-3">Group Expenses</h2>
        <div class="mb-4 d-flex gap-2">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal" onclick="prepareAddExpenseModal()">
                <i class="bi bi-plus-circle"></i> Add Expense
            </button>
            <button class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#recordLoanModal" onclick="prepareLoanModal()">
                <i class="bi bi-currency-exchange"></i> Record Loan
            </button>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs mb-4" id="expensesTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="daily-tab" data-bs-toggle="tab" data-bs-target="#daily" type="button" role="tab" aria-selected="true">Daily / Ad-hoc</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="fixed-tab" data-bs-toggle="tab" data-bs-target="#fixed" type="button" role="tab" aria-selected="false">Fixed Monthly</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="loans-tab" data-bs-toggle="tab" data-bs-target="#loans" type="button" role="tab" aria-selected="false">Loans & Transfers</button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="expensesTabsContent">
            <!-- Daily Expenses Tab -->
            <div class="tab-pane fade show active" id="daily" role="tabpanel" aria-labelledby="daily-tab">
                <div class="accordion" id="expensesAccordionDaily">
                    <div class="text-center text-muted py-4">Loading expenses...</div>
                </div>
            </div>

            <!-- Fixed Monthly Tab -->
            <div class="tab-pane fade" id="fixed" role="tabpanel" aria-labelledby="fixed-tab">
                <div class="accordion" id="expensesAccordionFixed">
                    <div class="text-center text-muted py-4">Loading expenses...</div>
                </div>
            </div>

            <!-- Loans Tab -->
            <div class="tab-pane fade" id="loans" role="tabpanel" aria-labelledby="loans-tab">
                <div class="accordion" id="expensesAccordionLoans">
                    <div class="text-center text-muted py-4">Loading expenses...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal fade" id="addExpenseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-primary-custom">Add Shared Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addExpenseForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="expenseTitle" placeholder="e.g. WiFi Bill" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Expense Type</label>
                            <select class="form-select" id="expenseType">
                                <option value="ad_hoc" selected>Daily / Ad-hoc (e.g. Snacks, Groceries)</option>
                                <option value="recurring">Fixed Monthly (e.g. Rent, Utility, Maid)</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Amount (₹)</label>
                                <input type="number" step="0.01" class="form-control" id="expenseAmount" required oninput="updateSplitInputs()">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="expenseCategory">
                                    <option value="utility">Utility</option>
                                    <option value="grocery">Grocery</option>
                                    <option value="rent">Rent</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Who Paid?</label>
                            <div class="mb-2">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="paidBy" id="paidByMe" value="me" checked onchange="togglePayersSection()">
                                    <label class="form-check-label" for="paidByMe">Me</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="paidBy" id="paidByMultiple" value="multiple" onchange="togglePayersSection()">
                                    <label class="form-check-label" for="paidByMultiple">Multiple People</label>
                                </div>
                            </div>
                            
                            <!-- Multiple Payers Inputs -->
                            <div class="card bg-light border-0 d-none" id="multiplePayersSection">
                                <div class="card-body py-2 px-3" id="payersContainer">
                                    <!-- Dynamic -->
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Split Type</label>
                            <div class="mb-2">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="splitType" id="splitEqual" value="equal" checked onchange="toggleSplitsSection()">
                                    <label class="form-check-label" for="splitEqual">Equally</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="splitType" id="splitCustom" value="custom" onchange="toggleSplitsSection()">
                                    <label class="form-check-label" for="splitCustom">Custom</label>
                                </div>
                            </div>
                            <!-- Custom Splits Inputs -->
                            <div class="card bg-light border-0 d-none" id="customSplitsSection">
                                <div class="card-body py-2 px-3" id="splitsContainer">
                                    <!-- Dynamic -->
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveExpense()">Save Expense</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Record Loan Modal -->
    <div class="modal fade" id="recordLoanModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-success">Record Loan / Transfer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="recordLoanForm">
                        <div class="mb-3">
                            <label class="form-label">Who is involved?</label>
                            <select class="form-select" id="loanUserId" required>
                                <option value="" disabled selected>Select roommate</option>
                                <!-- Dynamic -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Type of Transfer</label>
                            <select class="form-select" id="loanType" required>
                                <option value="gave">I lent them money (They owe me)</option>
                                <option value="received">I borrowed from them (I owe them)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="loanAmount" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Note (Optional)</label>
                            <input type="text" class="form-control" id="loanNote" placeholder="e.g. For cab fare">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveLoan()">Save Transfer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/expenses.js"></script>
</body>
</html>
