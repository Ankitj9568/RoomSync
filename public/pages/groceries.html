<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groceries - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-3">Grocery Log</h2>
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addGroceryModal" onclick="prepareAddGroceryModal()">
                <i class="bi bi-plus-circle"></i> Log Purchase
            </button>
            <div class="bg-light px-3 py-2 rounded shadow-sm">
                <span class="text-muted small me-2">Total Spent:</span>
                <span class="fw-bold text-dark fs-5" id="totalSpentText">₹ 0.00</span>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Item</th>
                                <th>Quantity</th>
                                <th>Amount (₹)</th>
                                <th>Purchasers (Contributors)</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="groceriesTableBody">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-3">Loading groceries...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Grocery Modal -->
    <div class="modal fade" id="addGroceryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title text-primary-custom">Log Grocery Purchase</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addGroceryForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Item Name</label>
                            <input type="text" class="form-control" id="groceryItemName" placeholder="e.g. Rice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="text" class="form-control" id="groceryQuantity" placeholder="e.g. 5 kg">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total Amount (₹)</label>
                            <input type="number" class="form-control" id="groceryAmount" step="0.01" required oninput="updateContributorInputs()">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Who Paid? (Contributors)</label>
                            <div id="contributorsContainer" class="border rounded p-2 bg-light">
                                <!-- Populated dynamically based on group members -->
                                <div class="text-muted small">Loading members...</div>
                            </div>
                            <div class="form-text text-danger d-none" id="contributorError">Total contributions must equal the total amount.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Purchase Date</label>
                            <input type="date" class="form-control" id="groceryDate" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveGroceryBtn">Save Purchase</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/groceries.js"></script>
</body>
</html>
