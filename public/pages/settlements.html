<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlements - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-4">Pending Settlements</h2>

        <!-- Visualizations & Tracking -->
        <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card shadow-sm border-0 h-100 bg-light">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted-custom fw-bold"><i class="bi bi-clock-history me-2"></i>Last Settlement</span>
                            <span class="badge bg-success" id="lastSettlementAmount">-</span>
                        </div>
                        <h6 class="mb-0" id="lastSettlementText">No recent settlements</h6>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted-custom fw-bold">Group Debt Cleared</span>
                            <span class="text-success fw-bold" id="clearedPercentText">0%</span>
                        </div>
                        <div class="progress" style="height: 12px;">
                            <div class="progress-bar bg-success" id="clearedProgressBar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-2 small text-muted">
                            <span id="clearedAmountText">₹ 0 Settled</span>
                            <span id="pendingAmountText">₹ 0 Pending</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="debtsContainer">
            <div class="col-12 text-center text-muted py-4">Loading settlements...</div>
        </div>
    </div>

    <!-- Record Payment Modal -->
    <div class="modal fade" id="recordPaymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-success">Record Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="recordPaymentForm">
                        <div class="mb-3">
                            <label class="form-label text-muted-custom">Paying to <strong id="modalPayeeName"></strong></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="modalPaymentAmount" required>
                            <div class="form-text">You can change this to log a partial payment.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Mode</label>
                            <select class="form-select mb-2" id="modalPaymentMode">
                                <option value="UPI">UPI</option>
                                <option value="Cash">Cash</option>
                                <option value="Combination">Combination</option>
                            </select>
                            <input type="text" class="form-control form-control-sm" id="modalPaymentCombo" placeholder="If combination, specify amounts (e.g. ₹50 Cash, ₹300 UPI)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Note (Optional)</label>
                            <input type="text" class="form-control" id="modalPaymentNote" placeholder="e.g. For dinner and wifi">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="recordPayment()">Save Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/settlements.js"></script>
</body>
</html>
