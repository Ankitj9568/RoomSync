<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlements - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-4">Pending Settlements</h2>

        <!-- Visualizations & Tracking -->
        <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card shadow-sm border-0 h-100 bg-light">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted-custom fw-bold"><i class="bi bi-clock-history me-2"></i>Last Settlement</span>
                            <span class="badge bg-success">₹ 2,000</span>
                        </div>
                        <h6 class="mb-0"><strong>Rohan</strong> paid <strong>Aditi</strong> <span class="text-muted small float-end">July 20th</span></h6>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted-custom fw-bold">Group Debt Cleared</span>
                            <span class="text-success fw-bold">75%</span>
                        </div>
                        <div class="progress" style="height: 12px;">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 75%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-2 small text-muted">
                            <span>₹ 3,000 Settled</span>
                            <span>₹ 1,000 Pending</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Settlement Card 1 -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; font-weight: bold;">
                                    R
                                </div>
                                <i class="bi bi-arrow-right mx-3 text-muted"></i>
                                <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; font-weight: bold;">
                                    A
                                </div>
                            </div>
                            <div class="text-end">
                                <h4 class="text-danger mb-0">₹ 450.00</h4>
                            </div>
                        </div>
                        <p class="mb-4"><strong>Rohan</strong> owes <strong>Aditi</strong></p>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button class="btn btn-success" type="button" data-bs-toggle="modal" data-bs-target="#recordPaymentModal"><i class="bi bi-check2-circle me-1"></i> Log Payment</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settlement Card 2 -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; font-weight: bold;">
                                    K
                                </div>
                                <i class="bi bi-arrow-right mx-3 text-muted"></i>
                                <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; font-weight: bold;">
                                    R
                                </div>
                            </div>
                            <div class="text-end">
                                <h4 class="text-success mb-0">₹ 150.00</h4>
                            </div>
                        </div>
                        <p class="mb-4"><strong>Karan</strong> owes <strong>Rohan</strong></p>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button class="btn btn-outline-secondary" disabled>Waiting for Payment</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Record Payment Modal -->
    <div class="modal fade" id="recordPaymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-success">Record Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-muted-custom">Paying to <strong>Aditi</strong></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" class="form-control" value="450.00" required>
                            <div class="form-text">You can change this to log a partial payment.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Mode</label>
                            <select class="form-select mb-2">
                                <option>UPI</option>
                                <option>Cash</option>
                                <option>Combination (e.g. ₹50 Cash, ₹300 UPI)</option>
                            </select>
                            <input type="text" class="form-control form-control-sm" placeholder="If combination, specify amounts (e.g. ₹50 Cash, ₹300 UPI)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Note (Optional)</label>
                            <input type="text" class="form-control" placeholder="e.g. For dinner and wifi">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success">Save Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
