<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-4">Shared Shopping List</h2>

        <!-- Add Item Form -->
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-3 align-items-center">
                    <div class="col-sm-6">
                        <label class="visually-hidden">Item Name</label>
                        <input type="text" class="form-control" placeholder="What do we need? (e.g. Eggs 1 dozen)">
                    </div>
                    <div class="col-sm-4">
                        <label class="visually-hidden">Assign To</label>
                        <select class="form-select">
                            <option selected>Assign To...</option>
                            <option value="1">Aditi</option>
                            <option value="2">Rohan</option>
                        </select>
                    </div>
                    <div class="col-sm-2 d-grid">
                        <button type="submit" class="btn btn-primary">Add Item</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- List -->
        <div class="card">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <input class="form-check-input me-2" type="checkbox" value="">
                        <strong>Eggs 1 dozen</strong>
                        <span class="badge bg-warning text-dark ms-2">Pending</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="text-muted-custom small me-3">Assigned to: Karan</span>
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </div>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center py-3 bg-light text-muted">
                    <div>
                        <input class="form-check-input me-2" type="checkbox" value="" checked disabled>
                        <del>Cooking Oil 1L</del>
                        <span class="badge bg-success ms-2">Purchased</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="small me-3">Purchased by: Aditi</span>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
