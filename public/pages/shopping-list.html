<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-4">Shared Shopping List</h2>

        <!-- Add Item Form -->
        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body">
                <form id="addItemForm" class="row g-3 align-items-center">
                    <div class="col-sm-6">
                        <label class="visually-hidden">Item Name</label>
                        <input type="text" class="form-control" id="itemName" placeholder="What do we need? (e.g. Eggs 1 dozen)" required>
                    </div>
                    <div class="col-sm-4">
                        <label class="visually-hidden">Assign To</label>
                        <select class="form-select" id="assignTo">
                            <option value="" selected>Assign To... (Optional)</option>
                            <!-- Dynamic -->
                        </select>
                    </div>
                    <div class="col-sm-2 d-grid">
                        <button type="submit" class="btn btn-primary">Add Item</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- List -->
        <div class="card shadow-sm border-0">
            <ul class="list-group list-group-flush" id="shoppingListContainer">
                <li class="list-group-item text-center text-muted py-4">Loading shopping list...</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/shopping-list.js"></script>
</body>
</html>
