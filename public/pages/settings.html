<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - RoomSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2 class="text-primary-custom mb-4">Settings</h2>

        <div class="row">
            <!-- Profile Settings -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-muted-custom border-bottom pb-2 mb-4">My Profile</h5>
                        <form id="profileForm">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="profileName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="profileEmail" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number (Optional)</label>
                                <input type="tel" class="form-control" id="profilePhone">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">UPI ID (Optional)</label>
                                <input type="text" class="form-control" id="profileUpi">
                            </div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4">
                    <button class="btn btn-outline-danger w-100" onclick="handleLogout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
                </div>
            </div>

            <!-- Group Settings -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5 class="card-title text-muted-custom border-bottom pb-2 mb-4">Group Settings</h5>
                        
                        <div class="mb-4">
                            <label class="form-label">Active Group</label>
                            <select class="form-select" id="groupSelect" disabled>
                                <!-- Dynamic -->
                            </select>
                        </div>
                        
                        <div class="mb-4 bg-light p-3 rounded">
                            <h6 class="text-muted-custom">Invite Members</h6>
                            <p class="mb-2">Share this code with flatmates so they can join:</p>
                            <div class="input-group">
                                <input type="text" class="form-control text-center font-monospace fw-bold fs-5" id="groupCode" readonly>
                                <button class="btn btn-outline-secondary" type="button" onclick="copyGroupCode()"><i class="bi bi-clipboard"></i> Copy</button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h6 class="text-muted-custom mb-3">Group Members</h6>
                            <ul class="list-group list-group-flush" id="groupMembersList">
                                <li class="list-group-item text-center text-muted">Loading...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
